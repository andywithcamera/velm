{{define "page-header"}}
<section class="ui-page-header">
  <div class="ui-breadcrumbs">
    {{range $index, $crumb := .Breadcrumbs}}
      {{if gt $index 0}}<span>/</span>{{end}}
      <a href="{{$crumb.Href}}">{{$crumb.Label}}</a>
    {{end}}
  </div>
  <h1 class="ui-title">{{.PageTitle}}</h1>
  {{if .Section}}
    <p class="ui-subtitle">{{.Section}}</p>
  {{end}}
  {{if .AppID}}
    <p class="ui-subtitle">App Scope: <code>{{.AppID}}</code></p>
  {{end}}
</section>
{{end}}
